<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4d4d"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#4361ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blueGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 라운드 -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- 배경 빛 효과 -->
  <circle cx="150" cy="280" r="120" fill="#ff4d4d" opacity="0.08"/>
  <circle cx="362" cy="280" r="120" fill="#4361ee" opacity="0.08"/>

  <!-- 저울 중심 기둥 (세로) -->
  <rect x="250" y="175" width="12" height="200" rx="6" fill="#e0e0e0"/>

  <!-- 저울 받침대 -->
  <rect x="196" y="370" width="120" height="16" rx="8" fill="#c0c0c0"/>

  <!-- 저울 가로 빔 -->
  <rect x="120" y="178" width="272" height="10" rx="5" fill="url(#scaleGrad)" filter="url(#glow)"/>

  <!-- 중앙 피벗 점 -->
  <circle cx="256" cy="183" r="14" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="256" cy="183" r="8" fill="#1a1a2e"/>

  <!-- 왼쪽 접시 줄 -->
  <line x1="140" y1="188" x2="128" y2="265" stroke="#ff4d4d" stroke-width="3" opacity="0.9"/>
  <line x1="140" y1="188" x2="178" y2="265" stroke="#ff4d4d" stroke-width="3" opacity="0.9"/>

  <!-- 왼쪽 접시 (살짝 아래) -->
  <ellipse cx="153" cy="268" rx="42" ry="10" fill="none" stroke="#ff4d4d" stroke-width="4" filter="url(#redGlow)"/>
  <ellipse cx="153" cy="265" rx="38" ry="8" fill="#ff4d4d" opacity="0.2"/>

  <!-- 왼쪽 접시 위 사람 실루엣 (내 잘못 심볼) -->
  <circle cx="153" cy="242" r="11" fill="#ff4d4d" opacity="0.85" filter="url(#redGlow)"/>
  <path d="M 136 258 Q 153 248 170 258" stroke="#ff4d4d" stroke-width="3.5" fill="none" opacity="0.85" filter="url(#redGlow)"/>

  <!-- 오른쪽 접시 줄 -->
  <line x1="372" y1="188" x2="360" y2="255" stroke="#4361ee" stroke-width="3" opacity="0.9"/>
  <line x1="372" y1="188" x2="410" y2="255" stroke="#4361ee" stroke-width="3" opacity="0.9"/>

  <!-- 오른쪽 접시 (살짝 위, 가벼운 쪽) -->
  <ellipse cx="385" cy="258" rx="42" ry="10" fill="none" stroke="#4361ee" stroke-width="4" filter="url(#blueGlow)"/>
  <ellipse cx="385" cy="255" rx="38" ry="8" fill="#4361ee" opacity="0.2"/>

  <!-- 오른쪽 접시 위 사람 실루엣 (상대방 심볼) -->
  <circle cx="385" cy="232" r="11" fill="#4361ee" opacity="0.85" filter="url(#blueGlow)"/>
  <path d="M 368 248 Q 385 238 402 248" stroke="#4361ee" stroke-width="3.5" fill="none" opacity="0.85" filter="url(#blueGlow)"/>

  <!-- 하단 텍스트 -->
  <text x="256" y="432" text-anchor="middle" font-family="sans-serif" font-size="52" font-weight="900" fill="#ffffff" opacity="0.95" letter-spacing="-1">잘잘못</text>
</svg>
